<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飞机大战 - DeepSeek Version</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a2e; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; color: #fff; flex-direction: column; }
  canvas { display: block; }
  #overlay { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
  #overlay.active { pointer-events: all; }
  #overlay h1 { font-size: 36px; color: #0ff; text-shadow: 0 0 20px #0ff; margin-bottom: 12px; }
  #overlay button { padding: 12px 32px; font-size: 18px; cursor: pointer; background: rgba(0,255,255,0.1); color: #0ff; border: 2px solid #0ff; font-family: inherit; border-radius: 4px; }
  #overlay button:hover { background: rgba(0,255,255,0.25); }
  #hud { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; font-size: 13px; z-index: 2; }
  .hi { color: #0f0; }
  .hi span { color: #ff0; }
  #info { margin-top: 6px; font-size: 12px; color: #556; }
</style>
</head>
<body>
  <div id="hud">
    <div class="hi">得分: <span id="score">0</span></div>
    <div class="hi">生命: <span id="lives">3</span></div>
    <div class="hi">关卡: <span id="level">1</span></div>
    <div class="hi">最高分: <span id="hs">0</span></div>
  </div>
  <div style="position:relative;">
    <canvas id="game" width="420" height="620"></canvas>
    <div id="overlay" class="active" style="width:420px;height:620px;">
      <h1 id="oTitle">飞机大战</h1>
      <button id="btnStart" onclick="game.start()">开始游戏</button>
      <div id="oMsg" style="margin-top:10px;color:#889;font-size:13px;"></div>
    </div>
  </div>
  <div id="info">WASD / 方向键移动 | 空格 / J 射击 | P 暂停</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const C = {
  PS: 5, PFR: 8, PL: 3, BS: 8, EBS: 3.5, SI: 45,
  PUC: 0.001, PUD: 300, SD: 300, ML: 5, SC: 80,
  COL: {
    PB: '#0ff', PW: '#088', BL: '#ff0',
    ES: '#f44', EM: '#f80', EB: '#c0f', EBL: '#f80',
    SH: 'rgba(0,255,255,', EX: ['#ff0','#f80','#f00','#fff'],
    PU_SPD: '#0f0', PU_SH: '#0ff', PU_RP: '#f0f', PU_BM: '#ff0',
  },
};

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function rnd(a,b){return a+Math.random()*(b-a)}
function rndI(a,b){return Math.floor(rnd(a,b+1))}
function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}

function mkSnd(){
  const a=new(window.AudioContext||window.webkitAudioContext)();
  const p=(f,d,t='square',v=0.07)=>{try{const o=a.createOscillator(),g=a.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+d);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+d)}catch(e){}};
  return{
    shoot:()=>p(800,0.03,'square',0.03),
    hit:()=>p(300,0.06,'sawtooth',0.05),
    boom:()=>p(60,0.2,'sawtooth',0.09),
    pu:()=>{p(523,0.06);setTimeout(()=>p(784,0.08),60)},
    go:()=>{p(392,0.15);setTimeout(()=>p(262,0.3),150)},
    lv:()=>{p(523,0.06);setTimeout(()=>p(784,0.06),60);setTimeout(()=>p(1047,0.1),120)},
  };
}

class Stars{
  constructor(){this.s=[];for(let i=0;i<C.SC;i++)this.s.push({x:rnd(0,W),y:rnd(0,H),sp:rnd(0.3,2),sz:rnd(0.5,2),br:rnd(0.3,1)})}
  update(){for(const s of this.s){s.y+=s.sp;if(s.y>H){s.y=0;s.x=rnd(0,W)}}}
  draw(){for(const s of this.s){ctx.globalAlpha=s.br;ctx.fillStyle='#fff';ctx.fillRect(s.x,s.y,s.sz,s.sz)}ctx.globalAlpha=1}
}

class Game{
  constructor(){
    this.keys={};this.score=0;this.lives=C.PL;this.level=1;this.state='menu';
    this.hs=parseInt(localStorage.getItem('pbHS'))||0;
    this.player=null;this.bullets=[];this.enemies=[];this.eb=[];
    this.particles=[];this.powerups=[];this.stars=new Stars();
    this.snd=mkSnd();this.st=0;this.kil=0;this.ks=20;this.fc=0;this.paused=false;this.shk=0;
    this._input();
  }
  _input(){
    window.addEventListener('keydown',e=>{
      this.keys[e.code]=true;
      if(e.code==='KeyP'&&this.state==='playing')this.paused=!this.paused;
      if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
    });
    window.addEventListener('keyup',e=>{this.keys[e.code]=false});
  }
  _ov(t,m,s=true){
    document.getElementById('oTitle').textContent=t;
    document.getElementById('oMsg').textContent=m||'';
    document.getElementById('btnStart').style.display=s?'':'none';
    document.getElementById('overlay').classList.add('active');
  }
  _ho(){document.getElementById('overlay').classList.remove('active')}
  _sh(){if(this.score>this.hs){this.hs=this.score;localStorage.setItem('pbHS',this.hs)}}
  _hud(){
    document.getElementById('score').textContent=this.score;
    document.getElementById('lives').textContent=this.lives;
    document.getElementById('level').textContent=this.level;
    document.getElementById('hs').textContent=this.hs;
  }
  _expl(x,y,s='s'){const n=s==='b'?16:s==='m'?10:6;for(let i=0;i<n;i++){const a=rnd(0,Math.PI*2),sp=rnd(0.5,3);this.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,li:rnd(12,22),ml:22,co:C.COL.EX[rndI(0,3)]})}}

  start(){
    this.score=0;this.lives=C.PL;this.level=1;this.state='playing';this.paused=false;
    this.bullets=[];this.enemies=[];this.eb=[];this.particles=[];this.powerups=[];
    this.st=0;this.kil=0;this.fc=0;this.shk=0;
    this.player={x:W/2-20,y:H-80,w:40,h:40,cd:0,sht:0,rpt:0,spb:0};
    this._ho();this._hud();this.loop();
  }

  _mkE(){
    const l=this.level,r=Math.random();
    let tp,hp,w,h,sp,sc,co,fr;
    if(r<0.6){tp='s';hp=1;w=24;h=24;sp=rnd(2,3.5+l*.3);sc=100;co=C.COL.ES;fr=0}
    else if(r<0.9){tp='m';hp=2+Math.floor(l/2);w=32;h=32;sp=rnd(1.2,2.2+l*.2);sc=250;co=C.COL.EM;fr=120-l*10}
    else{tp='b';hp=5+l*2;w=48;h=48;sp=rnd(0.6,1.2+l*.1);sc=500;co=C.COL.EB;fr=80-l*5}
    return{x:rnd(10,W-10-w),y:-h,w,h,tp,hp,mhp:hp,sp,sc,co,alive:true,cd:0,fr:Math.max(30,fr),mt:0,mp:rnd(0,Math.PI*2)};
  }

  update(){
    if(this.state!=='playing'||this.paused)return;
    this.fc++;const p=this.player;
    let spd=C.PS*(p.spb>0?1.5:1);
    if(this.keys.ArrowUp||this.keys.KeyW)p.y-=spd;
    if(this.keys.ArrowDown||this.keys.KeyS)p.y+=spd;
    if(this.keys.ArrowLeft||this.keys.KeyA)p.x-=spd;
    if(this.keys.ArrowRight||this.keys.KeyD)p.x+=spd;
    p.x=clamp(p.x,0,W-p.w);p.y=clamp(p.y,0,H-p.h);

    if(p.cd>0)p.cd--;
    const fr=p.rpt>0?Math.floor(C.PFR/2):C.PFR;
    if((this.keys.Space||this.keys.KeyJ)&&p.cd<=0){
      p.cd=fr;this.snd.shoot();
      this.bullets.push({x:p.x+p.w/2-2,y:p.y-4,w:4,h:10,sp:C.BS,alive:true});
      if(p.rpt>0){
        this.bullets.push({x:p.x+2,y:p.y,w:3,h:8,sp:C.BS,alive:true});
        this.bullets.push({x:p.x+p.w-5,y:p.y,w:3,h:8,sp:C.BS,alive:true});
      }
    }
    if(p.sht>0)p.sht--;if(p.rpt>0)p.rpt--;if(p.spb>0)p.spb--;if(this.shk>0)this.shk--;

    this.st++;
    const iv=Math.max(15,C.SI-this.level*4);
    if(this.st>=iv){this.st=0;this.enemies.push(this._mkE())}

    for(const e of this.enemies){
      if(!e.alive)continue;e.mt+=0.03;e.y+=e.sp;
      if(e.tp==='s')e.x+=Math.sin(e.mp+e.mt*3)*1.5;
      if(e.cd>0)e.cd--;
      if(e.fr>0&&e.y>30&&e.cd<=0){e.cd=e.fr;this.eb.push({x:e.x+e.w/2-2,y:e.y+e.h,w:4,h:8,sp:C.EBS,alive:true})}
      if(e.y>H+50)e.alive=false;
    }

    for(const b of this.bullets){
      if(!b.alive)continue;b.y-=b.sp;
      if(b.y<-20){b.alive=false;continue}
      for(const e of this.enemies){
        if(!e.alive)continue;
        if(hit(b,e)){
          b.alive=false;e.hp--;this.snd.hit();this._expl(b.x,b.y);
          if(e.hp<=0){e.alive=false;this.score+=e.sc;this.kil++;this.snd.boom();this._expl(e.x+e.w/2,e.y+e.h/2,e.tp==='b'?'b':'m');this._spPU(e.x+e.w/2,e.y+e.h/2)}
          break;
        }
      }
    }
    this.bullets=this.bullets.filter(b=>b.alive);

    for(const b of this.eb){
      if(!b.alive)continue;b.y+=b.sp;
      if(b.y>H+20){b.alive=false;continue}
      if(hit(b,p)){b.alive=false;if(p.sht<=0){this.lives--;this.shk=10;this._expl(p.x+p.w/2,p.y+p.h/2,'m');if(this.lives>0)p.sht=90}}
    }
    this.eb=this.eb.filter(b=>b.alive);

    for(const e of this.enemies){
      if(!e.alive)continue;
      if(hit(e,p)){e.alive=false;this._expl(e.x+e.w/2,e.y+e.h/2,'b');this.snd.boom();if(p.sht<=0){this.lives--;this.shk=10;if(this.lives>0)p.sht=90}}
    }
    this.enemies=this.enemies.filter(e=>e.alive);

    for(const pu of this.powerups){pu.life--;pu.y+=1.5;if(pu.y>H)pu.life=0;if(pu.life<=0)continue;if(hit(pu,p)){pu.life=0;this.snd.pu();this._expl(pu.x,pu.y);if(pu.tp==='s')p.spb=C.PUD;else if(pu.tp==='d')p.sht=C.SD;else if(pu.tp==='r')p.rpt=C.PUD;else if(pu.tp==='b'){this.enemies.forEach(e=>{if(e.alive){e.alive=false;this.score+=e.sc;this._expl(e.x+e.w/2,e.y+e.h/2,'m')}});this.eb=[]}}}
    this.powerups=this.powerups.filter(pu=>pu.life>0);

    for(const pt of this.particles){pt.x+=pt.vx;pt.y+=pt.vy;pt.li--}
    this.particles=this.particles.filter(pt=>pt.li>0);
    this.stars.update();

    if(this.kil>=this.ks){this.level++;this.kil=0;this.ks=20+this.level*5;this.snd.lv();if(this.level>C.ML){this._sh();this.state='win';this._ov('胜利！',`通关！得分: ${this.score} | 最高分: ${this.hs}`);document.getElementById('btnStart').textContent='重新开始';return}}
    if(this.lives<=0){this._sh();this.snd.go();this.state='gameover';this._ov('游戏结束',`得分: ${this.score} | 最高分: ${this.hs}`);document.getElementById('btnStart').textContent='重新开始';return}
    this._hud();
  }

  _spPU(x,y){
    if(Math.random()>0.15)return;
    const ts=['s','d','r','b'],tp=ts[rndI(0,3)];
    const co={s:C.COL.PU_SPD,d:C.COL.PU_SH,r:C.COL.PU_RP,b:C.COL.PU_BM};
    this.powerups.push({x,y,w:20,h:20,tp,life:C.PUD,co:co[tp]});
  }

  draw(){
    ctx.save();
    if(this.shk>0)ctx.translate(rnd(-3,3),rnd(-3,3));
    ctx.fillStyle='#0a0a2e';ctx.fillRect(0,0,W,H);
    this.stars.draw();

    for(const pu of this.powerups){
      const bl=pu.life<60?Math.sin(pu.life*0.3)>0:true;if(!bl)continue;
      ctx.fillStyle=pu.co;ctx.globalAlpha=0.8;ctx.fillRect(pu.x,pu.y,pu.w,pu.h);ctx.globalAlpha=1;
      ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(pu.x,pu.y,pu.w,pu.h);
      ctx.fillStyle='#fff';ctx.font='10px monospace';ctx.textAlign='center';
      ctx.fillText({s:'S',d:'D',r:'R',b:'B'}[pu.tp],pu.x+pu.w/2,pu.y+pu.h/2+3);ctx.textAlign='start';
    }

    const p=this.player;
    if(p&&this.state==='playing'){
      ctx.save();ctx.translate(p.x+p.w/2,p.y+p.h/2);
      ctx.fillStyle='#f80';ctx.beginPath();ctx.moveTo(-6,p.h/2-2);ctx.lineTo(6,p.h/2-2);ctx.lineTo(0,p.h/2+6+Math.sin(this.fc*0.5)*4);ctx.fill();
      ctx.fillStyle=C.COL.PB;ctx.beginPath();ctx.moveTo(0,-p.h/2);ctx.lineTo(-8,p.h/2-6);ctx.lineTo(-4,p.h/2);ctx.lineTo(4,p.h/2);ctx.lineTo(8,p.h/2-6);ctx.closePath();ctx.fill();
      ctx.fillStyle=C.COL.PW;ctx.beginPath();ctx.moveTo(-8,p.h/2-6);ctx.lineTo(-p.w/2,p.h/2);ctx.lineTo(-8,p.h/2-2);ctx.fill();
      ctx.beginPath();ctx.moveTo(8,p.h/2-6);ctx.lineTo(p.w/2,p.h/2);ctx.lineTo(8,p.h/2-2);ctx.fill();
      ctx.restore();
      if(p.sht>0){ctx.strokeStyle=`${C.COL.SH}${(0.3+0.3*Math.sin(this.fc*0.2)).toFixed(2)})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(p.x+p.w/2,p.y+p.h/2,p.w/2+6,0,Math.PI*2);ctx.stroke()}
    }

    for(const e of this.enemies){
      if(!e.alive)continue;ctx.fillStyle=e.co;ctx.save();ctx.translate(e.x+e.w/2,e.y+e.h/2);
      if(e.tp==='s'){ctx.beginPath();ctx.moveTo(0,e.h/2);ctx.lineTo(-e.w/2,-e.h/2);ctx.lineTo(e.w/2,-e.h/2);ctx.closePath();ctx.fill()}
      else if(e.tp==='m'){ctx.beginPath();ctx.moveTo(0,e.h/2);ctx.lineTo(-e.w/2,0);ctx.lineTo(-e.w/3,-e.h/2);ctx.lineTo(e.w/3,-e.h/2);ctx.lineTo(e.w/2,0);ctx.closePath();ctx.fill()}
      else{ctx.fillRect(-e.w/2,-e.h/2,e.w,e.h);ctx.fillStyle='#000';ctx.fillRect(-e.w/2+4,-e.h/2+4,e.w-8,e.h-8);ctx.fillStyle=e.co;ctx.fillRect(-e.w/2+8,-e.h/2+8,e.w-16,e.h-16)}
      ctx.restore();
      if(e.tp!=='s'&&e.hp<e.mhp){const bw=e.w;ctx.fillStyle='#333';ctx.fillRect(e.x,e.y-6,bw,3);ctx.fillStyle='#0f0';ctx.fillRect(e.x,e.y-6,bw*(e.hp/e.mhp),3)}
    }

    ctx.shadowColor=C.COL.BL;ctx.shadowBlur=6;ctx.fillStyle=C.COL.BL;
    for(const b of this.bullets)if(b.alive)ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.shadowBlur=0;
    ctx.fillStyle=C.COL.EBL;
    for(const b of this.eb)if(b.alive)ctx.fillRect(b.x,b.y,b.w,b.h);

    for(const pt of this.particles){ctx.globalAlpha=pt.li/pt.ml;ctx.fillStyle=pt.co;const sz=2*(pt.li/pt.ml)+1;ctx.fillRect(pt.x-sz/2,pt.y-sz/2,sz,sz)}
    ctx.globalAlpha=1;

    if(this.paused){ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#0ff';ctx.font='32px Courier New';ctx.textAlign='center';ctx.fillText('暂停',W/2,H/2);ctx.textAlign='start'}
    ctx.restore();
  }

  loop(){this.update();this.draw();if(this.state==='playing')requestAnimationFrame(()=>this.loop())}
}

const game=new Game();
</script>
</body>
</html>
