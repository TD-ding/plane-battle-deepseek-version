<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飞机大战 - DeepSeek Version</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a2e; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; color: #fff; flex-direction: column; }
  canvas { display: block; }
  #overlay { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
  #overlay.active { pointer-events: all; }
  #overlay h1 { font-size: 36px; color: #0ff; text-shadow: 0 0 20px #0ff; margin-bottom: 12px; }
  #overlay button { padding: 12px 32px; font-size: 18px; cursor: pointer; background: rgba(0,255,255,0.1); color: #0ff; border: 2px solid #0ff; font-family: inherit; border-radius: 4px; }
  #overlay button:hover { background: rgba(0,255,255,0.25); }
  #hud { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; font-size: 13px; z-index: 2; }
  .hud-item { color: #0f0; }
  .hud-item span { color: #ff0; }
  #info { margin-top: 6px; font-size: 12px; color: #556; }
  #touchPad { display: none; margin-top: 12px; gap: 4px; }
  .tbtn { width: 50px; height: 50px; font-size: 20px; cursor: pointer; background: rgba(0,255,255,0.1); color: #0ff; border: 2px solid #0ff; font-family: inherit; border-radius: 8px; user-select: none; -webkit-user-select: none; }
  .tbtn:active { background: rgba(0,255,255,0.3); }
  @media (pointer: coarse) { #touchPad { display: flex !important; flex-direction: column; align-items: center; } }
</style>
</head>
<body>
  <div id="hud">
    <div class="hud-item">得分: <span id="score">0</span></div>
    <div class="hud-item">生命: <span id="lives">3</span></div>
    <div class="hud-item">关卡: <span id="level">1</span></div>
    <div class="hud-item">最高分: <span id="hs">0</span></div>
  </div>
  <div style="position:relative;">
    <canvas id="game" width="420" height="620"></canvas>
    <div id="overlay" class="active" style="width:420px;height:620px;">
      <h1 id="oTitle">飞机大战</h1>
      <button id="btnStart" onclick="game.start()">开始游戏</button>
      <div id="oMsg" style="margin-top:10px;color:#889;font-size:13px;"></div>
    </div>
  </div>
  <div id="info">WASD / 方向键移动 | 空格 / J 射击 | P 暂停</div>

  <div id="touchPad">
    <div style="display:flex;justify-content:center;gap:4px;">
      <div></div>
      <button class="tbtn" ontouchstart="game.keys.ArrowUp=true" ontouchend="game.keys.ArrowUp=false">&#9650;</button>
      <div></div>
    </div>
    <div style="display:flex;justify-content:center;gap:4px;">
      <button class="tbtn" ontouchstart="game.keys.ArrowLeft=true" ontouchend="game.keys.ArrowLeft=false">&#9664;</button>
      <button class="tbtn" ontouchstart="game.keys.ArrowDown=true" ontouchend="game.keys.ArrowDown=false">&#9660;</button>
      <button class="tbtn" ontouchstart="game.keys.ArrowRight=true" ontouchend="game.keys.ArrowRight=false">&#9654;</button>
    </div>
    <div style="display:flex;justify-content:center;gap:8px;margin-top:8px;">
      <button class="tbtn" style="width:110px;background:rgba(255,100,0,0.2);border-color:#f80;" ontouchstart="game.keys.Space=true" ontouchend="game.keys.Space=false">射击</button>
    </div>
  </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

// === Config ===
const CFG = {
  PLAYER_SPEED: 5,
  PLAYER_FIRE_RATE: 8,
  PLAYER_LIVES: 3,
  BULLET_SPEED: 8,
  ENEMY_BULLET_SPEED: 3.5,
  SPAWN_INTERVAL: 45,
  POWERUP_CHANCE: 0.001,
  POWERUP_DURATION: 300,
  SHIELD_DURATION: 300,
  MAX_LEVEL: 5,
  STAR_COUNT: 80,
  COLORS: {
    PLAYER_BODY: '#0ff',
    PLAYER_WING: '#088',
    BULLET: '#ff0',
    ENEMY_SMALL: '#f44',
    ENEMY_MED: '#f80',
    ENEMY_BIG: '#c0f',
    ENEMY_BULLET: '#f80',
    SHIELD: 'rgba(0,255,255,',
    EXPLOSION: ['#ff0', '#f80', '#f00', '#fff'],
    PU_SPEED: '#0f0',
    PU_SHIELD: '#0ff',
    PU_RAPID: '#f0f',
    PU_BOMB: '#ff0',
  },
};

// === Utility ===
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function rnd(min, max) { return min + Math.random() * (max - min); }
function rndInt(min, max) { return Math.floor(rnd(min, max + 1)); }
function rectHit(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// === Sound ===
function createSoundSystem() {
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const play = (freq, dur, type = 'square', vol = 0.07) => {
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = vol;
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + dur);
    } catch (e) {}
  };
  return {
    shoot: () => play(800, 0.03, 'square', 0.03),
    hit: () => play(300, 0.06, 'sawtooth', 0.05),
    explode: () => play(60, 0.2, 'sawtooth', 0.09),
    powerup: () => { play(523, 0.06); setTimeout(() => play(784, 0.08), 60); },
    gameover: () => { play(392, 0.15); setTimeout(() => play(262, 0.3), 150); },
    levelup: () => { play(523, 0.06); setTimeout(() => play(784, 0.06), 60); setTimeout(() => play(1047, 0.1), 120); },
  };
}

// === Star Field ===
class StarField {
  constructor() {
    this.stars = [];
    for (let i = 0; i < CFG.STAR_COUNT; i++) {
      this.stars.push({
        x: rnd(0, W), y: rnd(0, H),
        speed: rnd(0.3, 2), size: rnd(0.5, 2), brightness: rnd(0.3, 1),
      });
    }
  }
  update() {
    for (const s of this.stars) {
      s.y += s.speed;
      if (s.y > H) { s.y = 0; s.x = rnd(0, W); }
    }
  }
  draw() {
    for (const s of this.stars) {
      ctx.globalAlpha = s.brightness;
      ctx.fillStyle = '#fff';
      ctx.fillRect(s.x, s.y, s.size, s.size);
    }
    ctx.globalAlpha = 1;
  }
}

// === Game ===
class Game {
  constructor() {
    this.keys = {};
    this.score = 0;
    this.lives = CFG.PLAYER_LIVES;
    this.level = 1;
    this.state = 'menu';
    this.highScore = parseInt(localStorage.getItem('pbHS')) || 0;
    this.player = null;
    this.bullets = [];
    this.enemies = [];
    this.enemyBullets = [];
    this.particles = [];
    this.powerups = [];
    this.stars = new StarField();
    this.sounds = createSoundSystem();
    this.spawnTimer = 0;
    this.killsInLevel = 0;
    this.killsToLevel = 20;
    this.frameCount = 0;
    this.paused = false;
    this.shakeTimer = 0;
    this.setupInput();
  }

  setupInput() {
    window.addEventListener('keydown', e => {
      this.keys[e.code] = true;
      if (e.code === 'KeyP' && this.state === 'playing') this.paused = !this.paused;
      if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault();
    });
    window.addEventListener('keyup', e => { this.keys[e.code] = false; });
  }

  showOverlay(title, msg, showBtn = true) {
    document.getElementById('oTitle').textContent = title;
    document.getElementById('oMsg').textContent = msg || '';
    document.getElementById('btnStart').style.display = showBtn ? '' : 'none';
    document.getElementById('overlay').classList.add('active');
  }

  hideOverlay() { document.getElementById('overlay').classList.remove('active'); }

  saveHighScore() {
    if (this.score > this.highScore) {
      this.highScore = this.score;
      localStorage.setItem('pbHS', this.highScore);
    }
  }

  updateHUD() {
    document.getElementById('score').textContent = this.score;
    document.getElementById('lives').textContent = this.lives;
    document.getElementById('level').textContent = this.level;
    document.getElementById('hs').textContent = this.highScore;
  }

  addExplosion(x, y, size = 'small') {
    const count = size === 'big' ? 16 : size === 'med' ? 10 : 6;
    for (let i = 0; i < count; i++) {
      const angle = rnd(0, Math.PI * 2);
      const speed = rnd(0.5, 3);
      this.particles.push({
        x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
        life: rnd(12, 22), maxLife: 22,
        color: CFG.COLORS.EXPLOSION[rndInt(0, 3)],
      });
    }
  }

  start() {
    this.score = 0;
    this.lives = CFG.PLAYER_LIVES;
    this.level = 1;
    this.state = 'playing';
    this.paused = false;
    this.bullets = [];
    this.enemies = [];
    this.enemyBullets = [];
    this.particles = [];
    this.powerups = [];
    this.spawnTimer = 0;
    this.killsInLevel = 0;
    this.frameCount = 0;
    this.shakeTimer = 0;
    this.player = { x: W / 2 - 20, y: H - 80, w: 40, h: 40, cooldown: 0, shieldTimer: 0, rapidTimer: 0, speedBuff: 0 };
    this.hideOverlay();
    this.updateHUD();
    this.loop();
  }

  createEnemy() {
    const lv = this.level;
    const roll = Math.random();
    let type, hp, w, h, speed, score, color, fireRate;
    if (roll < 0.6) {
      type = 'small'; hp = 1; w = 24; h = 24;
      speed = rnd(2, 3.5 + lv * 0.3); score = 100;
      color = CFG.COLORS.ENEMY_SMALL; fireRate = 0;
    } else if (roll < 0.9) {
      type = 'med'; hp = 2 + Math.floor(lv / 2); w = 32; h = 32;
      speed = rnd(1.2, 2.2 + lv * 0.2); score = 250;
      color = CFG.COLORS.ENEMY_MED; fireRate = 120 - lv * 10;
    } else {
      type = 'big'; hp = 5 + lv * 2; w = 48; h = 48;
      speed = rnd(0.6, 1.2 + lv * 0.1); score = 500;
      color = CFG.COLORS.ENEMY_BIG; fireRate = 80 - lv * 5;
    }
    return {
      x: rnd(10, W - 10 - w), y: -h, w, h, type, hp, maxHp: hp,
      speed, score, color, alive: true,
      cooldown: 0, fireRate: Math.max(30, fireRate),
      moveTimer: 0, movePhase: rnd(0, Math.PI * 2),
    };
  }

  spawnPowerup(x, y) {
    if (Math.random() > 0.15) return;
    const types = ['speed', 'shield', 'rapid', 'bomb'];
    const type = types[rndInt(0, 3)];
    const colorMap = { speed: CFG.COLORS.PU_SPEED, shield: CFG.COLORS.PU_SHIELD, rapid: CFG.COLORS.PU_RAPID, bomb: CFG.COLORS.PU_BOMB };
    this.powerups.push({ x, y, w: 20, h: 20, type, life: CFG.POWERUP_DURATION, color: colorMap[type] });
  }

  updatePlayer() {
    const p = this.player;
    const speed = CFG.PLAYER_SPEED * (p.speedBuff > 0 ? 1.5 : 1);
    if (this.keys['ArrowUp'] || this.keys['KeyW']) p.y -= speed;
    if (this.keys['ArrowDown'] || this.keys['KeyS']) p.y += speed;
    if (this.keys['ArrowLeft'] || this.keys['KeyA']) p.x -= speed;
    if (this.keys['ArrowRight'] || this.keys['KeyD']) p.x += speed;
    p.x = clamp(p.x, 0, W - p.w);
    p.y = clamp(p.y, 0, H - p.h);

    if (p.cooldown > 0) p.cooldown--;
    const fireRate = p.rapidTimer > 0 ? Math.floor(CFG.PLAYER_FIRE_RATE / 2) : CFG.PLAYER_FIRE_RATE;
    if ((this.keys['Space'] || this.keys['KeyJ']) && p.cooldown <= 0) {
      p.cooldown = fireRate;
      this.sounds.shoot();
      this.bullets.push({ x: p.x + p.w / 2 - 2, y: p.y - 4, w: 4, h: 10, speed: CFG.BULLET_SPEED, alive: true });
      if (p.rapidTimer > 0) {
        this.bullets.push({ x: p.x + 2, y: p.y, w: 3, h: 8, speed: CFG.BULLET_SPEED, alive: true });
        this.bullets.push({ x: p.x + p.w - 5, y: p.y, w: 3, h: 8, speed: CFG.BULLET_SPEED, alive: true });
      }
    }
    if (p.shieldTimer > 0) p.shieldTimer--;
    if (p.rapidTimer > 0) p.rapidTimer--;
    if (p.speedBuff > 0) p.speedBuff--;
    if (this.shakeTimer > 0) this.shakeTimer--;
  }

  updateEnemies() {
    for (const e of this.enemies) {
      if (!e.alive) continue;
      e.moveTimer += 0.03;
      e.y += e.speed;
      if (e.type === 'small') e.x += Math.sin(e.movePhase + e.moveTimer * 3) * 1.5;
      if (e.cooldown > 0) e.cooldown--;
      if (e.fireRate > 0 && e.y > 30 && e.cooldown <= 0) {
        e.cooldown = e.fireRate;
        this.enemyBullets.push({ x: e.x + e.w / 2 - 2, y: e.y + e.h, w: 4, h: 8, speed: CFG.ENEMY_BULLET_SPEED, alive: true });
      }
      if (e.y > H + 50) e.alive = false;
    }
  }

  updateBullets() {
    // Player bullets
    for (const b of this.bullets) {
      if (!b.alive) continue;
      b.y -= b.speed;
      if (b.y < -20) { b.alive = false; continue; }
      for (const e of this.enemies) {
        if (!e.alive) continue;
        if (rectHit(b, e)) {
          b.alive = false;
          e.hp--;
          this.sounds.hit();
          this.addExplosion(b.x, b.y);
          if (e.hp <= 0) {
            e.alive = false;
            this.score += e.score;
            this.killsInLevel++;
            this.sounds.explode();
            this.addExplosion(e.x + e.w / 2, e.y + e.h / 2, e.type === 'big' ? 'big' : 'med');
            this.spawnPowerup(e.x + e.w / 2, e.y + e.h / 2);
          }
          break;
        }
      }
    }
    this.bullets = this.bullets.filter(b => b.alive);

    // Enemy bullets
    for (const b of this.enemyBullets) {
      if (!b.alive) continue;
      b.y += b.speed;
      if (b.y > H + 20) { b.alive = false; continue; }
      if (rectHit(b, this.player)) {
        b.alive = false;
        if (this.player.shieldTimer <= 0) {
          this.lives--;
          this.shakeTimer = 10;
          this.addExplosion(this.player.x + this.player.w / 2, this.player.y + this.player.h / 2, 'med');
          if (this.lives > 0) this.player.shieldTimer = 90;
        }
      }
    }
    this.enemyBullets = this.enemyBullets.filter(b => b.alive);
  }

  updatePowerups() {
    for (const pu of this.powerups) {
      pu.life--;
      pu.y += 1.5;
      if (pu.y > H) { pu.life = 0; continue; }
      if (pu.life <= 0) continue;
      if (rectHit(pu, this.player)) {
        pu.life = 0;
        this.sounds.powerup();
        this.addExplosion(pu.x, pu.y);
        if (pu.type === 'speed') this.player.speedBuff = CFG.POWERUP_DURATION;
        else if (pu.type === 'shield') this.player.shieldTimer = CFG.SHIELD_DURATION;
        else if (pu.type === 'rapid') this.player.rapidTimer = CFG.POWERUP_DURATION;
        else if (pu.type === 'bomb') {
          for (const e of this.enemies) {
            if (e.alive) { e.alive = false; this.score += e.score; this.addExplosion(e.x + e.w / 2, e.y + e.h / 2, 'med'); }
          }
          this.enemyBullets = [];
        }
      }
    }
    this.powerups = this.powerups.filter(pu => pu.life > 0);
  }

  updateParticles() {
    for (const pt of this.particles) {
      pt.x += pt.vx;
      pt.y += pt.vy;
      pt.life--;
    }
    this.particles = this.particles.filter(pt => pt.life > 0);
  }

  update() {
    if (this.state !== 'playing' || this.paused) return;
    this.frameCount++;

    this.updatePlayer();

    // Spawn
    this.spawnTimer++;
    const interval = Math.max(15, CFG.SPAWN_INTERVAL - this.level * 4);
    if (this.spawnTimer >= interval) {
      this.spawnTimer = 0;
      this.enemies.push(this.createEnemy());
    }

    this.updateEnemies();
    this.updateBullets();

    // Enemy collision with player
    for (const e of this.enemies) {
      if (!e.alive) continue;
      if (rectHit(e, this.player)) {
        e.alive = false;
        this.addExplosion(e.x + e.w / 2, e.y + e.h / 2, 'big');
        this.sounds.explode();
        if (this.player.shieldTimer <= 0) {
          this.lives--;
          this.shakeTimer = 10;
          if (this.lives > 0) this.player.shieldTimer = 90;
        }
      }
    }
    this.enemies = this.enemies.filter(e => e.alive);

    this.updatePowerups();
    this.updateParticles();
    this.stars.update();

    // Level up
    if (this.killsInLevel >= this.killsToLevel) {
      this.level++;
      this.killsInLevel = 0;
      this.killsToLevel = 20 + this.level * 5;
      this.sounds.levelup();
      if (this.level > CFG.MAX_LEVEL) {
        this.saveHighScore();
        this.state = 'win';
        this.showOverlay('胜利！', `通关！得分: ${this.score} | 最高分: ${this.highScore}`);
        document.getElementById('btnStart').textContent = '重新开始';
        return;
      }
    }

    // Game over
    if (this.lives <= 0) {
      this.saveHighScore();
      this.sounds.gameover();
      this.state = 'gameover';
      this.showOverlay('游戏结束', `得分: ${this.score} | 最高分: ${this.highScore}`);
      document.getElementById('btnStart').textContent = '重新开始';
      return;
    }

    this.updateHUD();
  }

  draw() {
    ctx.save();
    if (this.shakeTimer > 0) ctx.translate(rnd(-3, 3), rnd(-3, 3));

    ctx.fillStyle = '#0a0a2e';
    ctx.fillRect(0, 0, W, H);
    this.stars.draw();

    // Powerups
    for (const pu of this.powerups) {
      const blink = pu.life < 60 ? Math.sin(pu.life * 0.3) > 0 : true;
      if (!blink) continue;
      ctx.fillStyle = pu.color;
      ctx.globalAlpha = 0.8;
      ctx.fillRect(pu.x, pu.y, pu.w, pu.h);
      ctx.globalAlpha = 1;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.strokeRect(pu.x, pu.y, pu.w, pu.h);
      ctx.fillStyle = '#fff';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      const labels = { speed: 'S', shield: 'D', rapid: 'R', bomb: 'B' };
      ctx.fillText(labels[pu.type], pu.x + pu.w / 2, pu.y + pu.h / 2 + 3);
      ctx.textAlign = 'start';
    }

    // Player
    const p = this.player;
    if (p && this.state === 'playing') {
      ctx.save();
      ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
      // Engine flame (dual)
      const flicker = Math.sin(this.frameCount * 0.5) * 4;
      ctx.fillStyle = '#ff4';
      ctx.beginPath();
      ctx.moveTo(-8, p.h / 2 - 2);
      ctx.lineTo(-2, p.h / 2 + 8 + flicker);
      ctx.lineTo(-4, p.h / 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(2, p.h / 2 - 2);
      ctx.lineTo(8, p.h / 2 + 8 + flicker);
      ctx.lineTo(4, p.h / 2);
      ctx.fill();
      ctx.fillStyle = '#f80';
      ctx.beginPath();
      ctx.moveTo(-6, p.h / 2 - 2);
      ctx.lineTo(6, p.h / 2 - 2);
      ctx.lineTo(0, p.h / 2 + 6 + flicker);
      ctx.fill();
      // Body
      ctx.fillStyle = CFG.COLORS.PLAYER_BODY;
      ctx.beginPath();
      ctx.moveTo(0, -p.h / 2);
      ctx.lineTo(-8, p.h / 2 - 6);
      ctx.lineTo(-4, p.h / 2);
      ctx.lineTo(4, p.h / 2);
      ctx.lineTo(8, p.h / 2 - 6);
      ctx.closePath();
      ctx.fill();
      // Wings
      ctx.fillStyle = CFG.COLORS.PLAYER_WING;
      ctx.beginPath();
      ctx.moveTo(-8, p.h / 2 - 6);
      ctx.lineTo(-p.w / 2, p.h / 2);
      ctx.lineTo(-8, p.h / 2 - 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(8, p.h / 2 - 6);
      ctx.lineTo(p.w / 2, p.h / 2);
      ctx.lineTo(8, p.h / 2 - 2);
      ctx.fill();
      ctx.restore();
      // Speed trail
      if (p.speedBuff > 0) {
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = CFG.COLORS.PU_SPEED;
        ctx.fillRect(p.x + 4, p.y + p.h, p.w - 8, 8);
        ctx.globalAlpha = 1;
      }
      // Rapid fire indicator
      if (p.rapidTimer > 0) {
        ctx.strokeStyle = CFG.COLORS.PU_RAPID;
        ctx.lineWidth = 1;
        ctx.setLineDash([2, 2]);
        ctx.strokeRect(p.x - 2, p.y - 2, p.w + 4, p.h + 4);
        ctx.setLineDash([]);
      }
      // Shield
      if (p.shieldTimer > 0) {
        ctx.strokeStyle = `${CFG.COLORS.SHIELD} ${(0.3 + 0.3 * Math.sin(this.frameCount * 0.2)).toFixed(2)})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(p.x + p.w / 2, p.y + p.h / 2, p.w / 2 + 6, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    // Enemies
    for (const e of this.enemies) {
      if (!e.alive) continue;
      ctx.fillStyle = e.color;
      ctx.save();
      ctx.translate(e.x + e.w / 2, e.y + e.h / 2);
      if (e.type === 'small') {
        ctx.beginPath();
        ctx.moveTo(0, e.h / 2);
        ctx.lineTo(-e.w / 2, -e.h / 2);
        ctx.lineTo(e.w / 2, -e.h / 2);
        ctx.closePath();
        ctx.fill();
      } else if (e.type === 'med') {
        ctx.beginPath();
        ctx.moveTo(0, e.h / 2);
        ctx.lineTo(-e.w / 2, 0);
        ctx.lineTo(-e.w / 3, -e.h / 2);
        ctx.lineTo(e.w / 3, -e.h / 2);
        ctx.lineTo(e.w / 2, 0);
        ctx.closePath();
        ctx.fill();
      } else {
        ctx.fillRect(-e.w / 2, -e.h / 2, e.w, e.h);
        ctx.fillStyle = '#000';
        ctx.fillRect(-e.w / 2 + 4, -e.h / 2 + 4, e.w - 8, e.h - 8);
        ctx.fillStyle = e.color;
        ctx.fillRect(-e.w / 2 + 8, -e.h / 2 + 8, e.w - 16, e.h - 16);
      }
      ctx.restore();
      if (e.type !== 'small' && e.hp < e.maxHp) {
        ctx.fillStyle = '#333';
        ctx.fillRect(e.x, e.y - 6, e.w, 3);
        ctx.fillStyle = '#0f0';
        ctx.fillRect(e.x, e.y - 6, e.w * (e.hp / e.maxHp), 3);
      }
    }

    // Player bullets
    ctx.shadowColor = CFG.COLORS.BULLET;
    ctx.shadowBlur = 6;
    ctx.fillStyle = CFG.COLORS.BULLET;
    for (const b of this.bullets) { if (b.alive) ctx.fillRect(b.x, b.y, b.w, b.h); }
    ctx.shadowBlur = 0;

    // Enemy bullets
    ctx.fillStyle = CFG.COLORS.ENEMY_BULLET;
    for (const b of this.enemyBullets) { if (b.alive) ctx.fillRect(b.x, b.y, b.w, b.h); }

    // Particles
    for (const pt of this.particles) {
      ctx.globalAlpha = pt.life / pt.maxLife;
      ctx.fillStyle = pt.color;
      const sz = 2 * (pt.life / pt.maxLife) + 1;
      ctx.fillRect(pt.x - sz / 2, pt.y - sz / 2, sz, sz);
    }
    ctx.globalAlpha = 1;

    // Pause
    if (this.paused) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#0ff';
      ctx.font = '32px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('暂停', W / 2, H / 2);
      ctx.textAlign = 'start';
    }

    ctx.restore();
  }

  loop() {
    this.update();
    this.draw();
    if (this.state === 'playing') requestAnimationFrame(() => this.loop());
  }
}

const game = new Game();
</script>
